<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧老师 - 你的AI学习伙伴</title>
    <meta property="og:title" content="智慧老师 - 你的AI学习伙伴">
    <meta property="og:description" content="有问题随时问我！">
    <meta name="wxg:share_title" content="智慧老师 - 你的AI学习伙伴">
    <meta name="wxg:share_desc" content="24小时在线的AI学习助手，有问题尽管问我！">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景动画 */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 数字人区域 - AI感虚拟形象 */
        .digital-human {
            position: relative;
            width: 280px;
            height: 380px;
            margin: 20px 0 30px;
        }

        .avatar-container {
            position: relative;
            width: 200px;
            height: 280px;
            margin: 0 auto;
        }

        /* 全新AI数字人形象 - 科技感少女 */
        .avatar {
            width: 200px;
            height: 280px;
            position: relative;
            animation: avatar-float 4s ease-in-out infinite;
        }

        @keyframes avatar-float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }

        /* AI头像外圈 - 科技光环 */
        .ai-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #00f2fe, #667eea, #764ba2, #f093fb, #00f2fe);
            animation: rotate-ring 8s linear infinite;
            opacity: 0.7;
        }

        @keyframes rotate-ring {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .ai-ring::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 50%;
        }

        /* 头像主体 */
        .avatar-main {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 200px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 80px 80px 60px 60px;
            box-shadow: 0 0 60px rgba(0, 242, 254, 0.5), inset 0 0 30px rgba(102, 126, 234, 0.3);
            overflow: hidden;
            border: 3px solid rgba(0, 242, 254, 0.5);
        }

        /* 脸部 */
        .avatar-face {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
        }

        /* 眼睛 - AI风格 */
        .avatar-eye {
            position: absolute;
            width: 32px;
            height: 32px;
            background: linear-gradient(180deg, #00f2fe 0%, #667eea 100%);
            border-radius: 50%;
            top: 15px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.5);
            animation: eye-glow 2s ease-in-out infinite;
        }

        @keyframes eye-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 242, 254, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(0, 242, 254, 1), inset 0 0 15px rgba(255, 255, 255, 0.8); }
        }

        .avatar-eye::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            top: 6px;
            left: 6px;
            animation: eye-sparkle 3s infinite;
        }

        @keyframes eye-sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        .avatar-eye.left { left: 12px; }
        .avatar-eye.right { right: 12px; }

        /* 嘴巴 - 微笑 */
        .avatar-mouth {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 8px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 0 0 12px 12px;
        }

        /* 耳朵上的AI装饰 */
        .ai-earpiece {
            position: absolute;
            top: 60px;
            width: 15px;
            height: 40px;
            background: linear-gradient(180deg, #667eea, #764ba2);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.8);
        }

        .ai-earpiece.left { left: 15px; }
        .ai-earpiece.right { right: 15px; }

        .ai-earpiece::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #00f2fe;
            border-radius: 50%;
            animation: ear-blink 1s infinite;
        }

        @keyframes ear-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 下半身 - 科技感服装 */
        .avatar-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 80px;
            background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
            border-radius: 0 0 60px 60px;
            overflow: hidden;
        }

        .avatar-body::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: conic-gradient(from 0deg, #00f2fe, #667eea, #764ba2, #00f2fe);
            border-radius: 50%;
            animation: body-pulse 3s ease-in-out infinite;
        }

        @keyframes body-pulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
            50% { transform: translateX(-50%) scale(1.1); opacity: 1; }
        }

        /* 刘海/头发 */
        .avatar-hair {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 40px;
            background: linear-gradient(180deg, #2d1f3d 0%, #4a3366 100%);
            border-radius: 60px 60px 0 0;
        }

        /* 发光底座 */
        .glow-ring {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 40px;
            background: radial-gradient(ellipse, rgba(0, 242, 254, 0.8) 0%, rgba(102, 126, 234, 0.4) 50%, transparent 70%);
            filter: blur(8px);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
        }

        /* 数据流效果 */
        .data-flow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 80px 80px 60px 60px;
            pointer-events: none;
        }

        .data-stream {
            position: absolute;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 242, 254, 0.5) 50%, transparent 100%);
            animation: stream 3s linear infinite;
        }

        .data-stream:nth-child(1) { left: 20%; animation-delay: 0s; }
        .data-stream:nth-child(2) { left: 40%; animation-delay: 1s; }
        .data-stream:nth-child(3) { left: 60%; animation-delay: 2s; }
        .data-stream:nth-child(4) { left: 80%; animation-delay: 0.5s; }

        @keyframes stream {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* 名字 */
        .name-badge {
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* 对话区域 */
        .chat-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .chat-messages {
            height: 350px;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            display: flex;
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }

        .message.ai .message-bubble {
            background: rgba(255,255,255,0.9);
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, #e8d5f2, #d4a5e0);
        }

        /* 输入区域 */
        .input-area {
            display: flex;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.9);
            font-size: 15px;
            outline: none;
        }

        .input-area input:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        .input-area button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 20px;
            margin-left: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-area button:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        /* 功能按钮 */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }

        /* 管理后台 */
        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            overflow-y: auto;
        }

        .admin-content {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: #1a1a2e;
            border-radius: 20px;
            color: white;
        }

        .admin-content h2 {
            margin-bottom: 20px;
            color: #667eea;
        }

        .qa-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .qa-form input, .qa-form textarea {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #0f3460;
            color: white;
            font-size: 14px;
        }

        .qa-form textarea {
            min-height: 80px;
            resize: vertical;
        }

        .qa-form button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .qa-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .qa-item {
            padding: 15px;
            background: #0f3460;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .qa-item-content {
            flex: 1;
        }

        .qa-item-q {
            font-weight: bold;
            color: #4facfe;
            margin-bottom: 5px;
        }

        .qa-item-a {
            color: #ddd;
        }

        .qa-delete {
            padding: 5px 10px;
            background: #ff6b6b;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .close-admin {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        /* 提示框 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px;
            background: rgba(255,255,255,0.9);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .digital-human {
                transform: scale(0.85);
                margin-bottom: 10px;
            }
            
            .chat-container {
                max-width: 100%;
            }
            
            .chat-messages {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <div class="name-badge">🌟 智慧老师</div>
        
        <div class="digital-human">
            <div class="avatar-container">
                <div class="ai-ring"></div>
                <div class="avatar">
                    <div class="avatar-main">
                        <div class="data-flow">
                            <div class="data-stream"></div>
                            <div class="data-stream"></div>
                            <div class="data-stream"></div>
                            <div class="data-stream"></div>
                        </div>
                        <div class="avatar-hair"></div>
                        <div class="avatar-face">
                            <div class="avatar-earpiece left"></div>
                            <div class="avatar-earpiece right"></div>
                            <div class="avatar-eye left"></div>
                            <div class="avatar-eye right"></div>
                            <div class="avatar-mouth"></div>
                        </div>
                        <div class="avatar-body"></div>
                    </div>
                </div>
                <div class="glow-ring"></div>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message ai">
                    <div class="message-avatar">🌸</div>
                    <div class="message-bubble">
                        你好呀！我是智慧老师~ 🦋<br><br>
                        有什么学习上的问题都可以问我哦！<br>
                        我会尽力帮你解答的！
                    </div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn" onclick="shareToWechat()">📱 微信分享</button>
            <button class="action-btn" onclick="openAdmin()">⚙️ 管理问答库</button>
            <button class="action-btn" onclick="clearChat()">🗑️ 清空对话</button>
        </div>
    </div>

    <!-- 管理后台 -->
    <div class="admin-panel" id="adminPanel">
        <span class="close-admin" onclick="closeAdmin()">×</span>
        <div class="admin-content">
            <h2>📚 问答知识库管理</h2>
            <p style="color: #888; margin-bottom: 20px;">在这里添加常见问题和答案，学生问相关问题时我会自动回答</p>
            
            <div class="qa-form">
                <input type="text" id="questionInput" placeholder="问题（例如：什么是Python？）">
                <textarea id="answerInput" placeholder="答案（例如：Python是一种高级编程语言...）"></textarea>
                <button onclick="addQA()">➕ 添加问答</button>
            </div>

            <h3 style="margin: 20px 0;">已添加的问答 (点击可复制)</h3>
            <div class="qa-list" id="qaList"></div>
            
            <div style="margin-top: 30px; padding: 20px; background: #16213e; border-radius: 10px;">
                <h4>📷 自定义数字人形象</h4>
                <p style="color: #888; margin: 10px 0; font-size: 14px;">上传你的照片作为数字人形象</p>
                <input type="file" id="avatarUpload" accept="image/*" onchange="handleAvatarUpload(event)" style="margin-bottom: 10px;">
                <button class="action-btn" onclick="resetAvatar()">🔄 恢复默认形象</button>
            </div>

            <div style="margin-top: 30px; padding: 20px; background: #16213e; border-radius: 10px;">
                <h4>🔊 语音设置</h4>
                <p style="color: #888; margin: 10px 0; font-size: 14px;">AI回答时自动朗读</p>
                <button class="action-btn" id="soundToggle" onclick="toggleSound()">🔊 语音开启</button>
            </div>

            <div style="margin-top: 30px; padding: 20px; background: #16213e; border-radius: 10px;">
                <h4>💾 数据操作</h4>
                <p style="color: #888; margin: 10px 0; font-size: 14px;">点击下方按钮导出/导入问答数据</p>
                <button class="action-btn" onclick="exportData()">📤 导出数据</button>
                <button class="action-btn" onclick="importData()">📥 导入数据</button>
                <input type="file" id="importFile" style="display: none;" onchange="handleImport(event)">
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 问答知识库
        let qaDatabase = JSON.parse(localStorage.getItem('teacherQA')) || [
            { q: '你好', a: '你好呀！很高兴见到你！有什么问题想问老师吗？' },
            { q: '你是谁', a: '我是智慧老师，是一个AI助手，专门帮助同学们解决学习上的问题！' },
            { q: '有什么用', a: '我可以帮你解答各学科的问题，比如数学、物理、化学、编程等。有不懂的问题尽管问我！' }
        ];

        // 保存到本地存储
        function saveQA() {
            localStorage.setItem('teacherQA', JSON.stringify(qaDatabase));
        }

        // 显示提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            // 显示输入中
            showTyping();

            // 模拟AI思考
            setTimeout(() => {
                removeTyping();
                const answer = getAnswer(message);
                addMessage(answer, 'ai');
            }, 800 + Math.random() * 1000);
        }

        // 语音播放功能 - 中文女声
        function speakText(text) {
            if ('speechSynthesis' in window) {
                // 停止之前的语音
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.9;
                utterance.pitch = 1.2; // 更高的音调，更像女声
                
                // 尝试选择中文女声
                const voices = window.speechSynthesis.getVoices();
                // 优先选择中文女声 (通常女性声音名称含有female或声调较高)
                let chineseVoice = voices.find(v => v.lang.includes('zh-CN') && (v.name.includes('Female') || v.name.includes('female') || v.name.includes('Ting') || v.name.includes('Mei') || v.name.includes('Xiaoxuan')));
                if (!chineseVoice) {
                    // 次选任何中文声音
                    chineseVoice = voices.find(v => v.lang.includes('zh'));
                }
                if (chineseVoice) {
                    utterance.voice = chineseVoice;
                    utterance.pitch = 1.2; // 确保高音调
                }
                
                window.speechSynthesis.speak(utterance);
            }
        }

        // 添加消息
        function addMessage(text, type) {
            const messages = document.getElementById('chatMessages');
            const avatar = type === 'ai' ? '🌸' : '👤';
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `
                ${type === 'ai' ? '<div class="message-avatar">' + avatar + '</div>' : ''}
                <div class="message-bubble">${text}</div>
                ${type === 'user' ? '<div class="message-avatar">' + avatar + '</div>' : ''}
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            
            // AI回答时自动播放语音
            if (type === 'ai') {
                // 提取纯文本（去除HTML标签）
                const plainText = text.replace(/<[^>]*>/g, '');
                speakText(plainText);
            }
        }

        // 显示输入中
        function showTyping() {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message ai';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="message-avatar">🌸</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // 移除输入中
        function removeTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // 智能回答
        function getAnswer(question) {
            const q = question.toLowerCase();
            
            // 精确匹配
            for (const item of qaDatabase) {
                if (q.includes(item.q.toLowerCase())) {
                    return item.a;
                }
            }
            
            // 关键词匹配
            const keywords = {
                '数学': '关于数学问题，你可以具体描述一下是哪个知识点吗？比如代数、几何、微积分等',
                '物理': '物理问题很有趣呢！请问是力学、电磁学还是光学部分？',
                '化学': '化学是很有意思的学科！请问你想了解哪方面的内容？',
                '编程': '编程方面的问题我可以帮你！是Python、Java还是其他语言？',
                '代码': '编程方面的问题我可以帮你！是Python、Java还是其他语言？',
                '英语': '英语学习要找对方法哦！背单词、练听力还是语法？',
                '语文': '语文学习要多读多写！文言文、现代文还是作文？',
                '历史': '历史问题很有意思！请问是哪一段历史时期？',
                '地理': '地理问题问对人啦！自然地理还是人文地理？'
            };

            for (const [key, value] of Object.entries(keywords)) {
                if (q.includes(key)) return value;
            }

            // 默认回复
            const defaults = [
                '这个问题真棒！让我想想怎么回答你...',
                '好问题！让我组织一下语言~',
                '嗯，这是一个很有意思的问题！',
                '我明白了！让我来帮你解答~'
            ];
            return defaults[Math.floor(Math.random() * defaults.length)] + '<br><br>不过我目前知识库里的相关内容较少，你可以让老师先添加一些常见问题到知识库里，这样我就能更好地回答你啦！';
        }

        // 键盘回车
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // 清空对话
        function clearChat() {
            const messages = document.getElementById('chatMessages');
            messages.innerHTML = `
                <div class="message ai">
                    <div class="message-avatar">🌸</div>
                    <div class="message-bubble">
                        对话已清空~<br>
                        有什么新问题吗？
                    </div>
                </div>
            `;
            showToast('对话已清空');
        }

        // 微信分享
        function shareToWechat() {
            const shareUrl = window.location.href;
            
            // 复制链接
            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast('🔗 链接已复制！请打开微信粘贴分享给同学');
            }).catch(() => {
                // 尝试其他方法
                const text = '🌟 智慧老师 - 你的AI学习伙伴\n有问题随时问我！\n' + window.location.href;
                navigator.clipboard.writeText(text).then(() => {
                    showToast('📱 分享内容已复制！');
                }).catch(() => {
                    showToast('请手动复制页面链接分享');
                });
            });
        }

        // 打开管理面板
        function openAdmin() {
            const password = prompt('请输入管理密码:');
            if (password !== '119313') {
                showToast('密码错误！');
                return;
            }
            document.getElementById('adminPanel').style.display = 'block';
            renderQAList();
        }

        // 关闭管理面板
        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        // 添加问答
        function addQA() {
            const q = document.getElementById('questionInput').value.trim();
            const a = document.getElementById('answerInput').value.trim();
            
            if (!q || !a) {
                showToast('请填写问题和答案');
                return;
            }

            qaDatabase.push({ q, a });
            saveQA();
            
            document.getElementById('questionInput').value = '';
            document.getElementById('answerInput').value = '';
            
            renderQAList();
            showToast('添加成功！');
        }

        // 渲染问答列表
        function renderQAList() {
            const list = document.getElementById('qaList');
            list.innerHTML = qaDatabase.map((item, index) => `
                <div class="qa-item">
                    <div class="qa-item-content">
                        <div class="qa-item-q">Q${index + 1}: ${item.q}</div>
                        <div class="qa-item-a">A: ${item.a.substring(0, 50)}${item.a.length > 50 ? '...' : ''}</div>
                    </div>
                    <button class="qa-delete" onclick="deleteQA(${index})">删除</button>
                </div>
            `).join('');
        }

        // 删除问答
        function deleteQA(index) {
            if (confirm('确定删除这个问题吗？')) {
                qaDatabase.splice(index, 1);
                saveQA();
                renderQAList();
                showToast('已删除');
            }
        }

        // 导出数据
        function exportData() {
            const data = JSON.stringify(qaDatabase, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '智慧老师问答库.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('📤 数据已导出');
        }

        // 导入数据
        function importData() {
            document.getElementById('importFile').click();
        }

        // 处理导入
        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        qaDatabase = data;
                        saveQA();
                        renderQAList();
                        showToast('📥 数据导入成功！');
                    } else {
                        showToast('文件格式错误');
                    }
                } catch (err) {
                    showToast('文件解析失败');
                }
            };
            reader.readAsText(file);
        }

        // 头像处理
        let customAvatar = localStorage.getItem('teacherAvatar') || 'avatar.jpg';
        let soundEnabled = localStorage.getItem('teacherSound') !== 'false';

        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                customAvatar = e.target.result;
                localStorage.setItem('teacherAvatar', customAvatar);
                applyCustomAvatar();
                showToast('📷 头像已更新！');
            };
            reader.readAsDataURL(file);
        }

        function applyCustomAvatar() {
            const avatarImg = document.getElementById('customAvatarImg');
            if (avatarImg) {
                avatarImg.src = customAvatar;
                avatarImg.style.display = 'block';
            }
        }

        function resetAvatar() {
            localStorage.removeItem('teacherAvatar');
            customAvatar = 'avatar.jpg';
            const avatarImg = document.getElementById('customAvatarImg');
            if (avatarImg) {
                avatarImg.src = 'avatar.jpg';
                avatarImg.style.display = 'block';
            }
            showToast('已恢复默认形象');
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            localStorage.setItem('teacherSound', soundEnabled);
            const btn = document.getElementById('soundToggle');
            btn.textContent = soundEnabled ? '🔊 语音开启' : '🔇 语音关闭';
            showToast(soundEnabled ? '🔊 语音已开启' : '🔇 语音已关闭');
        }

        // 修改语音播放函数，检查开关状态
        const originalSpeakText = speakText;
        speakText = function(text) {
            if (!soundEnabled) return;
            originalSpeakText(text);
        };

        // 初始化
        renderQAList();
        
        // 应用自定义头像
        window.addEventListener('DOMContentLoaded', function() {
            applyCustomAvatar();
            
            // 初始化语音按钮状态
            const soundBtn = document.getElementById('soundToggle');
            if (soundBtn) {
                soundBtn.textContent = soundEnabled ? '🔊 语音开启' : '🔇 语音关闭';
            }
        });
</body>
</html>
