<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寮犻洴鑰佸笀鐨勬暟瀛楀垎韬?/title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #6B5CE7;
    --primary-light: #8B7FF0;
    --primary-dark: #4A3CC4;
    --accent: #FF6B9D;
    --bg-dark: #0A0E1A;
    --text-light: #E8E8F0;
    --text-muted: #8888AA;
    --glass: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.12);
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg-dark);
    color: var(--text-light);
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* 鑳屾櫙 */
  .bg-anim {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(107,92,231,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,107,157,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(0,200,255,0.08) 0%, transparent 50%),
                linear-gradient(135deg, #0A0E1A 0%, #0D1230 50%, #0A0E1A 100%);
  }
  .bg-particles { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%;
    animation: float linear infinite; opacity: 0;
  }
  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; } 90% { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* 椤堕儴鏍?*/
  .header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: rgba(10,14,26,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
  }
  .header-title {
    font-size: 17px; font-weight: 700;
    background: linear-gradient(135deg, #fff 0%, var(--primary-light) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--glass); border: 1px solid var(--glass-border);
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.2s;
  }
  .btn-icon:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-icon.active { background: rgba(107,92,231,0.3); color: var(--primary-light); border-color: var(--primary); }

  /* 涓讳綋 */
  .main { position: relative; z-index: 5; flex: 1; display: flex; overflow: hidden; }

  /* 宸︿晶鏁板瓧浜洪潰鏉?*/
  .avatar-panel {
    width: 320px; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 18px;
    border-right: 1px solid var(--glass-border);
    background: rgba(10,14,26,0.45);
    overflow-y: auto;
  }
  .avatar-panel::-webkit-scrollbar { width: 3px; }
  .avatar-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* 澶村儚瀹瑰櫒 */
  .avatar-wrapper {
    position: relative; width: 190px; height: 190px; margin-bottom: 16px;
  }
  .avatar-ring {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 2px solid rgba(107,92,231,0.3);
    animation: ring-pulse 2s ease-in-out infinite;
    pointer-events: none;
  }
  .avatar-ring:nth-child(2) { inset: -16px; animation-delay: 0.5s; border-color: rgba(107,92,231,0.2); }
  .avatar-ring:nth-child(3) { inset: -24px; animation-delay: 1s; border-color: rgba(107,92,231,0.1); }
  @keyframes ring-pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.04); opacity: 0.5; }
  }

  .avatar-container {
    width: 190px; height: 190px; border-radius: 50%;
    position: relative; overflow: hidden;
    border: 3px solid transparent;
    background: linear-gradient(var(--bg-dark), var(--bg-dark)) padding-box,
                linear-gradient(135deg, var(--primary), var(--accent)) border-box;
    box-shadow: 0 0 40px rgba(107,92,231,0.5), 0 0 80px rgba(107,92,231,0.2);
    transition: box-shadow 0.3s;
  }
  .avatar-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  .avatar-container.speaking {
    box-shadow: 0 0 60px rgba(107,92,231,0.8), 0 0 120px rgba(107,92,231,0.35);
    animation: avatar-speak 0.6s ease-in-out infinite alternate;
  }
  @keyframes avatar-speak {
    0% { transform: scale(1); }
    100% { transform: scale(1.03); }
  }

  /* ===== 鍔ㄦ€佹暟瀛椾汉澶村儚 ===== */
  .digi-face {
    width: 100%; height: 100%;
    position: relative;
    background: linear-gradient(160deg, #1a1040 0%, #0d0820 100%);
    border-radius: 50%;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  /* 鑳屾櫙鎵弿绾?*/
  .digi-face::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(107,92,231,0.04) 3px, rgba(107,92,231,0.04) 4px);
    animation: scan-move 8s linear infinite;
    pointer-events: none;
  }
  @keyframes scan-move { from{background-position:0 0} to{background-position:0 100px} }

  /* 鎵弿鍏夌嚎 */
  .digi-scan {
    position: absolute; top: -10%; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, transparent, rgba(107,92,231,0.5), rgba(162,155,254,0.8), rgba(107,92,231,0.5), transparent);
    animation: scan-line 3s ease-in-out infinite;
    filter: blur(1px);
    pointer-events: none;
  }
  @keyframes scan-line { 0%{top:-10%} 100%{top:110%} }

  /* 浜鸿劯杞粨 */
  .digi-head {
    position: relative;
    width: 120px; height: 145px;
    background: linear-gradient(160deg, #2a1f6e 0%, #1a1248 100%);
    border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
    border: 1.5px solid rgba(107,92,231,0.6);
    box-shadow: 0 0 20px rgba(107,92,231,0.4), inset 0 0 30px rgba(107,92,231,0.1);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    margin-top: 10px;
  }

  /* 澶村彂 */
  .digi-hair {
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    width: 130px; height: 55px;
    background: linear-gradient(180deg, #0d0820 60%, transparent);
    border-radius: 50% 50% 0 0;
    border-top: 2px solid rgba(162,155,254,0.5);
    border-left: 2px solid rgba(107,92,231,0.3);
    border-right: 2px solid rgba(107,92,231,0.3);
  }
  /* 涓や晶楝撹 */
  .digi-hair::before, .digi-hair::after {
    content: '';
    position: absolute;
    bottom: -30px;
    width: 18px; height: 50px;
    background: linear-gradient(180deg, #0d0820, transparent);
    border-radius: 0 0 10px 10px;
  }
  .digi-hair::before { left: -2px; }
  .digi-hair::after { right: -2px; }

  /* 鐪肩潧鍖哄煙 */
  .digi-eyes {
    display: flex; gap: 26px;
    margin-top: 10px;
    position: relative;
  }
  .digi-eye {
    width: 22px; height: 10px;
    background: linear-gradient(90deg, rgba(107,92,231,0.3), rgba(162,155,254,0.9), rgba(107,92,231,0.3));
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 8px rgba(162,155,254,0.8), 0 0 20px rgba(107,92,231,0.5);
    animation: eye-blink 4s ease-in-out infinite;
  }
  .digi-eye::after {
    content: '';
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 8px; height: 8px;
    background: radial-gradient(circle, #fff 0%, rgba(162,155,254,0.9) 50%, transparent 100%);
    border-radius: 50%;
    animation: eye-scan 2s ease-in-out infinite alternate;
  }
  @keyframes eye-blink {
    0%,90%,100%{transform:scaleY(1)}
    95%{transform:scaleY(0.1)}
  }
  @keyframes eye-scan {
    0%{left:30%} 100%{left:70%}
  }

  /* 鐪肩潧涓嬫柟鏁版嵁绾?*/
  .digi-eye-lines {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    width: 80px; display: flex; flex-direction: column; gap: 3px;
  }
  .digi-eye-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(107,92,231,0.4), transparent);
    animation: data-flow 1.5s ease-in-out infinite;
  }
  .digi-eye-line:nth-child(2){animation-delay:0.3s;width:60%;margin-left:20%}
  @keyframes data-flow { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

  /* 榧诲瓙 */
  .digi-nose {
    width: 2px; height: 12px;
    background: linear-gradient(180deg, transparent, rgba(107,92,231,0.5), transparent);
    margin: 6px 0 4px;
    border-radius: 1px;
  }

  /* 鍢村反 */
  .digi-mouth {
    width: 36px; height: 10px;
    border-radius: 0 0 18px 18px;
    border: 1.5px solid rgba(162,155,254,0.6);
    border-top: none;
    position: relative;
    box-shadow: 0 0 8px rgba(107,92,231,0.4);
    overflow: hidden;
    transition: height 0.1s;
  }
  .digi-mouth::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(107,92,231,0.2), rgba(162,155,254,0.1));
    animation: mouth-idle 3s ease-in-out infinite;
  }
  @keyframes mouth-idle { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

  /* 璇磋瘽鏃跺槾宸村姩 */
  .digi-face.speaking .digi-mouth {
    animation: mouth-speak 0.15s ease-in-out infinite alternate;
  }
  @keyframes mouth-speak { 0%{height:6px;border-radius:0 0 10px 10px} 100%{height:16px;border-radius:0 0 20px 20px} }

  /* 闈㈤儴鍏夋晥绮掑瓙 */
  .digi-dot {
    position: absolute;
    width: 3px; height: 3px; border-radius: 50%;
    background: rgba(162,155,254,0.7);
    animation: dot-float 3s ease-in-out infinite;
  }
  .digi-dot:nth-child(1){top:20%;left:15%;animation-delay:0s}
  .digi-dot:nth-child(2){top:35%;right:15%;animation-delay:0.8s}
  .digi-dot:nth-child(3){top:55%;left:18%;animation-delay:1.6s}
  .digi-dot:nth-child(4){top:65%;right:18%;animation-delay:0.4s}
  @keyframes dot-float { 0%,100%{opacity:0.3;transform:translateY(0)} 50%{opacity:1;transform:translateY(-4px)} }

  /* 棰堥儴 */
  .digi-neck {
    width: 28px; height: 18px;
    background: linear-gradient(180deg, #2a1f6e, #1a1248);
    border-left: 1px solid rgba(107,92,231,0.4);
    border-right: 1px solid rgba(107,92,231,0.4);
    margin-top: -1px;
  }

  /* 鑲╅儴 */
  .digi-shoulders {
    position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
    width: 160px; height: 55px;
    background: linear-gradient(180deg, #1a1248 0%, #0d0820 100%);
    border-radius: 0 0 50% 50%;
    border-top: 1.5px solid rgba(107,92,231,0.5);
    border-left: 1px solid rgba(107,92,231,0.3);
    border-right: 1px solid rgba(107,92,231,0.3);
    overflow: hidden;
  }
  /* 鑳稿墠鏁版嵁鏉?*/
  .digi-shoulders::after {
    content: '';
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 14px;
    background: linear-gradient(90deg, transparent, rgba(107,92,231,0.2), transparent);
    border: 1px solid rgba(107,92,231,0.4);
    border-radius: 3px;
    animation: chest-data 1.8s ease-in-out infinite;
  }
  @keyframes chest-data { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* 搴曢儴娓愬彉閬僵 */
  .digi-bottom-mask {
    position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
    background: linear-gradient(180deg, transparent, rgba(13,8,32,0.8));
    pointer-events: none;
  }

  /* 澶栧湀 AI 鎰熻楗?*/
  .digi-circuit {
    position: absolute; inset: 5px; border-radius: 50%;
    border: 1px solid transparent;
    background: transparent;
    pointer-events: none;
  }
  .digi-circuit::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    border: 1px dashed rgba(107,92,231,0.25);
    animation: circuit-spin 12s linear infinite;
  }
  @keyframes circuit-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* AI 鍏夋晥鍙犲姞灞?*/
  .avatar-overlay {
    position: absolute; inset: 0; border-radius: 50%;
    background: linear-gradient(180deg, transparent 60%, rgba(107,92,231,0.2) 100%);
    pointer-events: none;
  }
  /* 璇磋瘽鏃跺叏鑴稿彂鍏?*/
  .avatar-mouth-glow {
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(ellipse at 50% 65%, rgba(107,92,231,0.3) 0%, transparent 60%);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .avatar-container.speaking .avatar-mouth-glow { opacity: 1; animation: mouth-glow 0.3s ease-in-out infinite alternate; }
  @keyframes mouth-glow { 0%{opacity:0.3} 100%{opacity:0.8} }

  /* 鐘舵€?*/
  .status-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 20px;
    background: rgba(0,200,100,0.12);
    border: 1px solid rgba(0,200,100,0.25);
    font-size: 12px; color: #00C864; margin-bottom: 10px;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #00C864; animation: blink 1.5s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .avatar-name { font-size: 20px; font-weight: 700; letter-spacing: 1px; margin-bottom: 3px; }
  .avatar-role { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; }

  /* 澹扮汗 */
  .voice-bars {
    display: flex; align-items: center; gap: 3px;
    height: 36px; margin-bottom: 18px;
  }
  .voice-bar {
    width: 4px; border-radius: 2px;
    background: linear-gradient(to top, var(--primary), var(--accent));
    animation: voice-idle 1.5s ease-in-out infinite;
  }
  .voice-bars.speaking .voice-bar {
    animation: voice-speak 0.25s ease-in-out infinite alternate !important;
  }
  @keyframes voice-idle { 0%,100%{height:6px} 50%{height:12px} }
  @keyframes voice-speak { 0%{height:4px} 100%{height:32px} }

  /* 璇煶鎺у埗 */
  .voice-toggle {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 14px; border-radius: 20px;
    background: var(--glass); border: 1px solid var(--glass-border);
    color: var(--text-muted); font-size: 12px; cursor: pointer;
    transition: all 0.2s; margin-bottom: 18px;
    width: 100%; justify-content: center;
  }
  .voice-toggle.on {
    background: rgba(107,92,231,0.2);
    border-color: var(--primary);
    color: var(--primary-light);
  }
  .voice-toggle:hover { border-color: var(--primary); color: var(--primary-light); }

  /* 蹇嵎鎻愮ず */
  .quick-hints { width: 100%; }
  .quick-hints-title {
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 1px; margin-bottom: 8px; padding-left: 2px;
  }
  .hint-chip {
    display: block; width: 100%;
    padding: 8px 12px; margin-bottom: 7px;
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 10px; color: var(--text-light);
    font-size: 12px; cursor: pointer; text-align: left;
    transition: all 0.2s;
  }
  .hint-chip:hover {
    background: rgba(107,92,231,0.2);
    border-color: var(--primary); transform: translateX(4px);
  }

  /* 鍙充晶瀵硅瘽 */
  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 20px 24px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* 娑堟伅 */
  .message {
    display: flex; gap: 10px; margin-bottom: 18px;
    animation: msg-in 0.3s ease-out;
  }
  @keyframes msg-in { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .msg-avatar.teacher {
    border: 2px solid var(--primary-light);
    box-shadow: 0 0 10px rgba(107,92,231,0.4);
  }
  .msg-avatar.teacher img { width: 100%; height: 100%; object-fit: cover; object-position: center top; border-radius: 50%; }
  .msg-avatar.student {
    background: linear-gradient(135deg, #2A3A5A, #1A2A4A);
    border: 2px solid rgba(255,255,255,0.15);
  }

  .msg-content { max-width: 68%; }
  .msg-name { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; padding-left: 3px; }
  .message.user .msg-name { text-align: right; padding-right: 3px; }

  .msg-bubble {
    padding: 11px 15px; border-radius: 16px;
    font-size: 14px; line-height: 1.75; word-break: break-word;
  }
  .message.teacher .msg-bubble {
    background: linear-gradient(135deg, rgba(107,92,231,0.22), rgba(107,92,231,0.1));
    border: 1px solid rgba(107,92,231,0.28);
    border-radius: 4px 16px 16px 16px;
  }
  .message.user .msg-bubble {
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px 4px 16px 16px; text-align: right;
  }
  .msg-footer { display: flex; align-items: center; gap: 8px; margin-top: 5px; padding: 0 3px; }
  .msg-time { font-size: 10px; color: var(--text-muted); }
  .message.user .msg-footer { flex-direction: row-reverse; }

  /* 鏈楄鎸夐挳 */
  .speak-btn {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 9px; border-radius: 10px;
    background: rgba(107,92,231,0.12); border: 1px solid rgba(107,92,231,0.2);
    color: var(--text-muted); font-size: 11px; cursor: pointer;
    transition: all 0.2s;
  }
  .speak-btn:hover { background: rgba(107,92,231,0.25); color: var(--primary-light); }
  .speak-btn.playing { background: rgba(107,92,231,0.3); color: var(--primary-light); }

  /* 鎵撳瓧鍔ㄧ敾 */
  .typing-bubble { display: flex; align-items: center; gap: 5px; padding: 14px 16px; }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--primary-light); animation: typing 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2){ animation-delay:0.2s } .typing-dot:nth-child(3){ animation-delay:0.4s }
  @keyframes typing { 0%,100%{transform:translateY(0);opacity:0.4} 50%{transform:translateY(-5px);opacity:1} }

  /* 杈撳叆鍖?*/
  .chat-input-area {
    padding: 14px 20px 18px;
    background: rgba(10,14,26,0.65);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--glass-border);
  }
  .input-wrapper {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 16px; padding: 9px 12px; transition: border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color: var(--primary); }
  .chat-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text-light); font-size: 14px; font-family: inherit;
    resize: none; max-height: 120px; line-height: 1.6; padding: 2px 0;
  }
  .chat-input::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none; color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; transition: all 0.2s;
  }
  .send-btn:hover { transform: scale(1.07); box-shadow: 0 4px 20px rgba(107,92,231,0.5); }
  .send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

// ========== 璇煶鏈楄 ==========
let voiceEnabled = true;
let currentUtterance = null;
let currentSpeakBtn = null;

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('voiceToggleBtn');
  const side = document.getElementById('voiceToggleSide');
  const icon = document.getElementById('voiceIcon');
  const label = document.getElementById('voiceLabel');
  if (voiceEnabled) {
    btn.classList.add('active');
    side.classList.add('on');
    icon.textContent = '馃攰'; label.textContent = '璇煶鏈楄锛氬紑鍚?;
  } else {
    btn.classList.remove('active');
    side.classList.remove('on');
    icon.textContent = '馃攪'; label.textContent = '璇煶鏈楄锛氬叧闂?;
    stopSpeaking();
  }
}

function speak(text, btn) {
  if (!('speechSynthesis' in window)) return;
  stopSpeaking();
  const clean = text.replace(/[馃槉馃槃馃憢馃摎馃攰馃攪馃摛馃摫馃敆馃挕鉁煈┾€嶐煆煈も灓鈿橾/g, '').replace(/\*+/g, '').trim();
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'zh-CN';
  utter.rate = 0.92;
  utter.pitch = 1.15;
  utter.volume = 1;

  // 浼樺厛閫夋渶鑷劧鐨勪腑鏂囧コ澹?
  const voices = window.speechSynthesis.getVoices();
  const femaleKeywords = ['Xiaoxiao','鏅撴檽','Xiaoyi','鏅撲紛','Huihui','鎯犳儬','Yaoyao','Tingting','tingting','female','Female','woman'];
  let zhVoice = null;
  for (const kw of femaleKeywords) {
    zhVoice = voices.find(v => v.lang.startsWith('zh') && v.name.includes(kw));
    if (zhVoice) break;
  }
  if (!zhVoice) zhVoice = voices.find(v => v.lang === 'zh-CN') || voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utter.voice = zhVoice;

  utter.onstart = () => {
    currentSpeakBtn = btn;
    if (btn) btn.classList.add('playing');
    if (btn) btn.textContent = '鈴?鍋滄';
    document.getElementById('avatarContainer').classList.add('speaking');
    document.getElementById('voiceBars').classList.add('speaking');
    document.getElementById('statusText').textContent = '姝ｅ湪鏈楄鈥?;
  };
  utter.onend = utter.onerror = () => {
    if (btn) { btn.classList.remove('playing'); btn.textContent = '馃攰 鏈楄'; }
    document.getElementById('avatarContainer').classList.remove('speaking');
    document.getElementById('voiceBars').classList.remove('speaking');
    document.getElementById('statusText').textContent = '鍦ㄧ嚎瑙ｇ瓟涓?;
    currentUtterance = null; currentSpeakBtn = null;
  };
  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

function stopSpeaking() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (currentSpeakBtn) { currentSpeakBtn.classList.remove('playing'); currentSpeakBtn.textContent = '馃攰 鏈楄'; }
  document.getElementById('avatarContainer').classList.remove('speaking');
  document.getElementById('voiceBars').classList.remove('speaking');
  document.getElementById('statusText').textContent = '鍦ㄧ嚎瑙ｇ瓟涓?;
  currentUtterance = null; currentSpeakBtn = null;
}

function handleSpeakBtn(btn, text) {
  if (currentUtterance && currentSpeakBtn === btn) { stopSpeaking(); return; }
  speak(text, btn);
}

// 闂瓟寮曟搸
function findAnswer(question) {
  const kb = getKB();
  const q = question.toLowerCase().trim();
  if (!q) return null;
  for (const item of kb) { if (item.q && q === item.q.toLowerCase()) return item.a; }
  let best = null, bestScore = 0;
  for (const item of kb) {
    if (!item.q) continue;
    const keywords = item.q.toLowerCase().split(/[\s锛?銆?锛?锛?]+/).filter(k => k.length > 0);
    let score = 0;
    for (const kw of keywords) { if (q.includes(kw) || kw.includes(q)) score += kw.length; }
    if (score > bestScore) { bestScore = score; best = item; }
  }
  if (best && bestScore >= 1) return best.a;
  for (const item of kb) {
    if (!item.q) continue;
    const sim = computeSim(q, item.q.toLowerCase());
    if (sim > 0.5) return item.a;
  }
  return null;
}
function computeSim(a, b) {
  if (a === b) return 1;
  const longer = a.length > b.length ? a : b, shorter = a.length > b.length ? b : a;
  if (longer.length === 0) return 1;
  let m = 0; for (const c of shorter) { if (longer.includes(c)) m++; }
  return m / longer.length;
}
function fallback(q) {
  const arr = [
    `杩欎釜闂寰堝ソ锛佹垜鐩墠鐨勭煡璇嗗簱閲屾殏鏃舵病鏈夌浉鍏冲唴瀹癸紝寮犻洴鑰佸笀浼氭寔缁洿鏂版垜鐨勭煡璇嗗摝 馃槉`,
    `鍡紝璁╂垜鎯虫兂鈥︹€﹁繖閬撻瓒呭嚭浜嗘垜鐜板湪鐨勭煡璇嗚寖鍥达紝璇风◢鍚庤仈绯诲紶闆€佸笀鎴栫瓑寰呯煡璇嗗簱鏇存柊锛乣,
    `鎰熻阿鎻愰棶锛佸叧浜?${q.slice(0,15)}${q.length>15?'鈥?:''}"寮犻洴鑰佸笀杩樻湭褰曞叆鐩稿叧鍐呭锛岃鐩存帴鑱旂郴鑰佸笀~`,
    `杩欎釜闂鎴戣繕鍦ㄥ涔犱腑 馃摎 寮犻洴鑰佸笀浼氬畾鏈熸洿鏂扮煡璇嗗簱锛屾暚璇锋湡寰咃紒`,
  ];
  return arr[Math.floor(Math.random() * arr.length)];
}

async function sendMessage() {
  if (isTyping) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  isTyping = true;
  addMessage('user', text);
  const delay = 700 + Math.random() * 1000;
  addTyping();
  await new Promise(r => setTimeout(r, delay));
  removeTyping();
  const answer = findAnswer(text) || fallback(text);
  addMessage('teacher', answer, true); // true = 鑷姩鏈楄
  document.getElementById('sendBtn').disabled = false;
  isTyping = false;
}

function showToast(msg) {

}

function getQuestions() { try { return JSON.parse(localStorage.getItem('teacherQuestions') || '[]'); } catch(e) { return []; } }
function saveQuestions(data) { localStorage.setItem('teacherQuestions', JSON.stringify(data)); }

function submitQuestion() {
  const input = document.getElementById('questionInput');
  const text = input.value.trim();
  if (!text) {
    showToast('璇峰厛杈撳叆闂鍐呭');
    input.focus();
    return;
  }
  const questions = getQuestions();
  // 閬垮厤閲嶅鎻愪氦
  if (questions.some(q => q.text === text)) {
    showToast('杩欎釜闂宸茬粡鎻愪氦杩囦簡鍝?);
    return;
  }
  questions.unshift({
    text: text,
    time: new Date().toLocaleString('zh-CN')
  });
  saveQuestions(questions);
  input.value = '';
  // 鏄剧ず鎴愬姛鎻愮ず
  const success = document.getElementById('questionSuccess');
  success.style.display = 'block';
  success.style.animation = 'none';
  setTimeout(() => { success.style.animation = 'fadeInUp 0.3s ease-out'; }, 10);
  setTimeout(() => { success.style.display = 'none'; }, 3500);
  showToast('闂宸叉彁浜わ紒鑰佸笀浼氬敖蹇暣鐞?馃挕');
}

// 鍥炶溅鎻愪氦锛圫hift+Enter 鎹㈣锛?
